name: CC drift watch

# Nightly scan of @anthropic-ai/claude-code@latest against dario's pinned
# FALLBACK OAuth config, baked request template, and supported-range max.
# Catches CC-shipped changes the day they land instead of two weeks later
# when a user files an issue (see dario #40 and #42 for the pattern this
# is designed to pre-empt).

on:
  schedule:
    # 02:00 UTC daily — after west-coast business hours, before EU morning
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run drift check
        id: drift
        run: |
          set +e
          node scripts/check-cc-drift.mjs > drift-report.json 2> drift-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat drift-log.txt
          echo "--- report ---"
          cat drift-report.json

      - name: Extract CC version from report
        if: always()
        id: ver
        run: |
          CC_VERSION=$(node -e "try { console.log(JSON.parse(require('fs').readFileSync('drift-report.json','utf-8')).ccVersion || 'unknown') } catch (e) { console.log('unknown') }")
          echo "cc_version=$CC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Open / update drift issue
        if: steps.drift.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          TITLE="CC drift detected: v${CC_VERSION}"
          EXISTING=$(gh issue list --label cc-drift --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number')

          {
            echo "## Drift report"
            echo ""
            echo "Generated by \`.github/workflows/cc-drift-watch.yml\` against \`@anthropic-ai/claude-code@${CC_VERSION}\` on \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`."
            echo ""
            echo "### Raw report"
            echo '```json'
            cat drift-report.json
            echo '```'
            echo ""
            echo "### Run"
            echo ""
            echo "- [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- [Re-run manually](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/cc-drift-watch.yml)"
          } > issue-body.md

          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$TITLE" \
              --label cc-drift \
              --body-file issue-body.md
          else
            echo "Issue #$EXISTING already open for this version; appending a new run as a comment."
            gh issue comment "$EXISTING" --body-file issue-body.md
          fi

      - name: Close resolved drift issues
        if: steps.drift.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On a clean run, close any open cc-drift issues whose version
          # matches the one we just verified — drift resolved means the
          # next dario release picked up the change and the pin moved.
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          TITLE_MATCH="CC drift detected: v${CC_VERSION}"
          NUMBERS=$(gh issue list --label cc-drift --state open --search "in:title \"${TITLE_MATCH}\"" --json number --jq '.[].number')
          for n in $NUMBERS; do
            gh issue close "$n" --comment "Resolved — cc-drift-watch ran clean against CC v${CC_VERSION}. Pinned constants now match."
          done

      - name: Install Playwright Chromium for headless probe
        # The fetch-based probe (check-cc-authorize-probe.mjs) is blocked
        # by Cloudflare's bot challenge from GitHub Actions IPs. Headless
        # Chromium speaks TLS like a real browser and passes CF's JS
        # challenge, so the probe becomes a usable nightly signal instead
        # of returning "inconclusive" on most runs. Playwright is installed
        # ad-hoc in CI only — never declared in dario's package.json,
        # preserving the zero-runtime-dependency policy.
        run: |
          npm install --no-save playwright@1.49.0
          npx playwright install chromium --with-deps

      - name: Run authorize-URL probe (headless Chromium)
        id: probe
        # Hits the authorize endpoint with dario's pinned scope set and
        # with a 5-scope variant (`org:create_api_key` removed) to watch
        # for server-side policy flips on this client_id. Same assertion
        # shape as check-cc-authorize-probe.mjs; only the transport is
        # different. Falls back to the fetch variant in the next step if
        # headless throws (e.g. Chromium install failure).
        run: |
          set +e
          node scripts/check-cc-authorize-probe-headless.mjs > probe-report.json 2> probe-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat probe-log.txt
          echo "--- report ---"
          cat probe-report.json

      - name: Run authorize-URL probe (fetch fallback, only if headless failed)
        # Headless exit 2 means Playwright wasn't available. Any other
        # non-zero could be a real drift signal or a Chromium crash;
        # run the fetch-based script so we at least have SOMETHING to
        # compare against (even if it's CF-blocked → inconclusive).
        if: steps.probe.outputs.exit_code == '2'
        run: |
          set +e
          node scripts/check-cc-authorize-probe.mjs > probe-report.json 2> probe-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat probe-log.txt
          echo "--- report ---"
          cat probe-report.json

      - name: Open / update authorize-probe drift issue
        if: steps.probe.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          TITLE="CC authorize-probe drift: v${CC_VERSION}"
          EXISTING=$(gh issue list --label cc-drift --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number')

          {
            echo "## Authorize-probe drift"
            echo ""
            echo "The live authorize-URL probe flagged drift against Anthropic's authorize endpoint."
            echo "This is a different class of signal from the binary-scan watcher — it confirms the"
            echo "server-side policy engine, not just the shipped CC binary. See dario #42 for the"
            echo "motivating incident."
            echo ""
            echo "### Raw report"
            echo '```json'
            cat probe-report.json
            echo '```'
            echo ""
            echo "### Run"
            echo ""
            echo "- [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- [Re-run manually](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/cc-drift-watch.yml)"
          } > probe-issue-body.md

          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$TITLE" \
              --label cc-drift \
              --body-file probe-issue-body.md
          else
            echo "Issue #$EXISTING already open for this version; appending a new run as a comment."
            gh issue comment "$EXISTING" --body-file probe-issue-body.md
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cc-drift-report
          path: |
            drift-report.json
            drift-log.txt
            probe-report.json
            probe-log.txt
          retention-days: 30
