name: 'Checkout with retry'
description: >
  Wraps actions/checkout with auto-retry on transient credential failures.
  Eliminates the false-positive class observed 2026-05-23: `fatal: could not
  read Username for 'https://github.com': terminal prompts disabled` from
  GitHub-Actions ephemeral-runner credential provisioning races. Three
  attempts with exponential backoff (0s / 8s / 20s) before the job fails.

# This action is part of dario's absolute-minimal-human-intervention push.
# Pattern is propagatable verbatim to other askalf repos (platform, hands,
# deepdive, browser-bridge) — same checkout shape, same flake class.

inputs:
  ref:
    description: 'Ref to check out (branch, tag, or SHA)'
    required: false
  repository:
    description: 'Repository to check out (default: this repo)'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'Auth token (default: GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  fetch-depth:
    description: 'Commits to fetch (default 1)'
    required: false
    default: '1'
  path:
    description: 'Relative directory to check out into'
    required: false
  sparse-checkout:
    description: 'Sparse-checkout patterns'
    required: false
  persist-credentials:
    description: 'Whether to persist credentials in git config'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # Attempt 1 — immediate. Most calls succeed here. Uses the same SHA
    # pin (v6.0.2) that the rest of dario uses for actions/checkout.
    - name: Checkout (attempt 1)
      id: c1
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      continue-on-error: true
      with:
        ref: ${{ inputs.ref }}
        repository: ${{ inputs.repository }}
        token: ${{ inputs.token }}
        fetch-depth: ${{ inputs.fetch-depth }}
        path: ${{ inputs.path }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        persist-credentials: ${{ inputs.persist-credentials }}

    # Attempt 2 — after 8s backoff. Dodges the credential-provisioning
    # race window we keep hitting (~5s wide based on 2026-05-23 incidents
    # at 11:36 / 12:57 / 13:13 UTC).
    - name: Backoff before attempt 2
      if: steps.c1.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::actions/checkout attempt 1 failed (transient credential class). Backing off 8s before retry."
        sleep 8

    - name: Checkout (attempt 2)
      id: c2
      if: steps.c1.outcome == 'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      continue-on-error: true
      with:
        ref: ${{ inputs.ref }}
        repository: ${{ inputs.repository }}
        token: ${{ inputs.token }}
        fetch-depth: ${{ inputs.fetch-depth }}
        path: ${{ inputs.path }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        persist-credentials: ${{ inputs.persist-credentials }}

    # Attempt 3 — after 20s. If still failing, this is likely a genuine
    # outage (GitHub auth-service down, expired token, repo permission
    # issue) — not a transient. Job fails normally.
    - name: Backoff before attempt 3 (final)
      if: steps.c1.outcome == 'failure' && steps.c2.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::actions/checkout attempt 2 also failed. Final retry after 20s — if this fails, the failure is real."
        sleep 20

    - name: Checkout (attempt 3 — final, fail-on-error)
      if: steps.c1.outcome == 'failure' && steps.c2.outcome == 'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ inputs.ref }}
        repository: ${{ inputs.repository }}
        token: ${{ inputs.token }}
        fetch-depth: ${{ inputs.fetch-depth }}
        path: ${{ inputs.path }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        persist-credentials: ${{ inputs.persist-credentials }}

    # Tell operator (via run log) which attempt actually succeeded.
    # Useful for trending — if many runs need attempt 2/3, the
    # credential race is widening.
    - name: Record which attempt succeeded
      shell: bash
      run: |
        if [ "${{ steps.c1.outcome }}" = "success" ]; then
          echo "Checkout succeeded on attempt 1."
        elif [ "${{ steps.c2.outcome }}" = "success" ]; then
          echo "Checkout succeeded on attempt 2 (transient on first try)."
        else
          echo "Checkout succeeded on attempt 3 (transient on first + second tries)."
        fi
